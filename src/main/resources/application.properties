spring.application.name=Webshop
spring.main.banner-mode=off

spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=30000

server.port=${BACKEND_SERVER_PORT}
spring.datasource.url=${BACKEND_DATASOURCE_URL}
spring.datasource.username=${BACKEND_DB_USERNAME}
spring.datasource.password=${BACKEND_DB_PASSWORD}

spring.mail.host=${BACKEND_SPRING_MAIL_HOST}
spring.mail.port=${BACKEND_SPRING_MAIL_PORT}
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.auth=true
spring.mail.username=${BACKEND_SPRING_MAIL_USERNAME}
spring.mail.password=${BACKEND_SPRING_MAIL_PASSWORD}

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl